<div class="blog-page">
    <!-- Navbar -->
    <nav class="w-full bg-gradient-to-r from-black via-teal-900 to-teal-700 px-12 py-3">
        <ul class="flex justify-end gap-6 text-white font-semibold">
            <li>
                <a routerLink="/" routerLinkActive="active-link">
                    HOME
                </a>
            </li>

            <li>
                <a routerLink="/blog" routerLinkActive="active-link">
                    BLOG
                </a>
            </li>

            <li>
                <a routerLink="/about" routerLinkActive="active-link">
                    ABOUT US
                </a>
            </li>

            <li>
                <a routerLink="/contact" routerLinkActive="active-link">
                    CONTACT
                </a>
            </li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="text-center py-12">
        <h1 class="text-3xl font-bold">INSIGHTS AND INSPIRATION</h1>
        <h1 class="text-3xl font-bold uppercase mt-2">Explore our blog</h1>
        <p class="text-gray-500 mt-2">Dive into our blog for expert insights, tips, and industry trends to elevate your <br> project management journey.</p>

        <div class="mt-6 flex justify-center">
            <input class="border px-4 py-2 w-96 rounded-l" placeholder="Search articles">
            <button class="bg-teal-600 text-white px-4 rounded-r">🔍</button>
        </div>

          <div class="mt-6 flex justify-center">
               <div class="filter-wrapper">
            <button
                *ngFor="let tab of tabs"
                (click)="setTab(tab)"
                [ngClass]="activeTab === tab ? 'tab-active' : 'tab'">
                {{ tab }}
            </button>
            </div>
          </div>

    </section>

    <!-- Blog Cards -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 px-10">
        <div class="card" *ngFor="let blog of blogs">
            <img src="https://picsum.photos/400/200" class="rounded">
            <h3 class="font-semibold mt-3">{{blog.title}}</h3>
            <p class="text-sm text-gray-500">{{blog.desc}}</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-teal-900 text-white text-center py-4 mt-10">
        Powered by AKboss.boston
    </footer>
</div>
