<div class="admin-dashboard">
    <div class="flex">
        <app-admin-sidebar />
        <div class="content">
            <div class="p-6 bg-white shadow-md rounded-lg">
                <!-- Header -->
                <div class="mb-6">
                    <h1 class="text-2xl font-semibold text-gray-800">
                        Payment Method Update (Stripe)
                    </h1>
                    <p class="text-sm text-gray-500">
                        Dashboard / Payment Method Update (Stripe)
                    </p>
                </div>

                <!-- Card -->
                <div class="bg-white rounded-lg shadow p-6">

                    <!-- General Configuration -->
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">
                        General Configuration
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

                        <!-- Currency -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">
                                Payment Gateway Currency
                            </label>
                            <select class="w-full border rounded px-4 py-2 focus:outline-none focus:ring">
                                <option>INR</option>
                                <option>USD</option>
                            </select>
                        </div>

                        <!-- Image -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">
                                Payment Gateway Image <span class="text-red-500">(350×350)</span>
                            </label>
                            <input type="file"
                                class="w-full border rounded px-3 py-2 bg-white focus:outline-none focus:ring">
                            <p class="text-xs text-gray-400 mt-1">
                                Accepted Image Type: png, jpg, jpeg
                            </p>
                        </div>

                        <!-- Percentage Charge -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">
                                Percentage Charge <span class="text-red-500">*</span>
                            </label>
                            <input type="text" value="0.00000000"
                                class="w-full border rounded px-4 py-2 focus:outline-none focus:ring">
                        </div>

                        <!-- Currency Rate -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">
                                Currency Rate <span class="text-red-500">*</span>
                            </label>
                            <div class="flex">
                                <span
                                    class="inline-flex items-center px-3 border border-r-0 rounded-l bg-gray-100 text-sm">
                                    1 INR
                                </span>
                                <input type="text" value="87"
                                    class="w-full border-t border-b border-r px-4 py-2 focus:outline-none focus:ring">
                                <span
                                    class="inline-flex items-center px-3 border border-l-0 rounded-r bg-gray-100 text-sm">
                                    INR
                                </span>
                            </div>
                        </div>

                    </div>

                    <hr class="my-6">

                    <!-- Stripe Credentials -->
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">
                        Stripe Credentials
                    </h2>

                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">
                                Secret Key <span class="text-red-500">*</span>
                            </label>
                            <input type="password" value="###"
                                class="w-full border rounded px-4 py-2 focus:outline-none focus:ring">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">
                                Publishable Key <span class="text-red-500">*</span>
                            </label>
                            <input type="password" value="###"
                                class="w-full border rounded px-4 py-2 focus:outline-none focus:ring">
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="flex justify-end gap-3">
                        <button class="px-5 py-2 border rounded text-gray-600 hover:bg-gray-100">
                            Reset
                        </button>
                        <button class="px-5 py-2 bg-orange-500 text-white rounded hover:bg-orange-600">
                            Save
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
